site_name: Treinamento DevOps AWS IaC
site_description: DevOps e Infraestrutura como Código na AWS
site_author: uiuqM
site_url: https://uiuqm.github.io/treinamento-devops-aws-iac-epic

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true


nav:
  - Home: index.md
  - Ementa: plano-de-ensino.md
  - encontro-01: encontro-01.md
  - encontro-02: encontro-02.md
  - encontro-03: encontro-03.md
  - encontro-04: encontro-04.md
  - encontro-05: encontro-05.md
