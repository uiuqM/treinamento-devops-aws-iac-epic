<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Treinamento IAC AWS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #232f3e, #ff9900);
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      max-width: 600px;
      backdrop-filter: blur(8px);
    }
    h1 { font-size: 2rem; margin-bottom: 12px; }
    p  { font-size: 1.1rem; line-height: 1.6; }
    .badge {
      display: inline-block;
      background: #ff9900;
      color: #232f3e;
      font-weight: bold;
      border-radius: 6px;
      padding: 4px 12px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>☁️ Treinamento IAC AWS</h1>
    <p>Site hospedado no <strong>Amazon S3</strong> e provisionado com <strong>Terraform</strong>.</p>
    <p>Projeto 01 — Infraestrutura como Código na prática.</p>
    <div class="badge">AWS Academy ✔</div>
  </div>
</body>
</html>
